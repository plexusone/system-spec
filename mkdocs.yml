site_name: System Spec
site_description: A Go-native system topology specification
site_url: https://plexusone.github.io/system-spec
repo_url: https://github.com/plexusone/system-spec
repo_name: plexusone/system-spec

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - CLI Reference: getting-started/cli.md
  - Specification:
    - Overview: spec/overview.md
    - v0.1.0: spec/v0.1.0.md
  - Go SDK:
    - Usage: sdk/usage.md
    - API Reference: sdk/api.md
  - Rendering:
    - Overview: rendering/overview.md
    - D2: rendering/d2.md
    - Mermaid: rendering/mermaid.md
    - Cytoscape.js: rendering/cytoscape.md
    - Sigma.js: rendering/sigma.md
  - Integration:
    - Graphize: integration/graphize.md
  - Examples:
    - Payments System: examples/payments.md
  - Releases:
    - Changelog: changelog.md
    - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/system-spec
