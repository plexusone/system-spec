site_name: System Spec
site_description: A Go-native system topology specification
site_url: https://plexusone.github.io/system-spec
repo_url: https://github.com/plexusone/system-spec
repo_name: plexusone/system-spec

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - CLI Reference: getting-started/cli.md
  - Specification:
    - Overview: spec/overview.md
    - v0.1.0: spec/v0.1.0.md
  - Go SDK:
    - Usage: sdk/usage.md
    - API Reference: sdk/api.md
  - Rendering:
    - Overview: rendering/overview.md
    - D2: rendering/d2.md
    - Mermaid: rendering/mermaid.md
    - Cytoscape.js: rendering/cytoscape.md
    - Sigma.js: rendering/sigma.md
  - Integration:
    - Graphize: integration/graphize.md
  - Examples:
    - Payments System: examples/payments.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/system-spec
  version:
    provider: mike

copyright: Copyright &copy; 2026 Plexus One
